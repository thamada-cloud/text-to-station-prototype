document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:375,&quot;height&quot;:812},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;station&quot;,&quot;talkback&quot;],&quot;default&quot;:&quot;station&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#c6002b&quot;,&quot;options&quot;:[&quot;#c6002b&quot;,&quot;#0055b7&quot;,&quot;#7b1fa2&quot;,&quot;#1f8a5b&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;replyDelay&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:4000,&quot;min&quot;:1000,&quot;max&quot;:15000,&quot;step&quot;:1000,&quot;unit&quot;:&quot;ms&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.chatRef = React.createRef();\n    this.rootRef = React.createRef();\n    this.state = {\n      screen: (props && props.startScreen) || \"station\",\n      tab: \"voice\",\n      input: \"\",\n      messages: [\n        { id: 0, isAgent: true, isUser: false, avatar: \"assets/z100-logo.png\", text: \"Hey there! Thank you for being a Z100 listener! Send a message to us for contests, requests, or just to say hi.\" },\n      ],\n    };\n  }\n\n  get accent() { return this.props.accent || \"#c6002b\"; }\n\n  applyAccent() {\n    try { document.documentElement.style.setProperty(\"--accent\", this.accent); } catch (e) {}\n  }\n\n  hydrateImgs() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    root.querySelectorAll(\"img[data-src]\").forEach((im) => {\n      const v = im.getAttribute(\"data-src\");\n      if (v && v.indexOf(\"{{\") === -1 && im.getAttribute(\"src\") !== v) im.setAttribute(\"src\", v);\n    });\n  }\n\n  componentDidMount() { this.applyAccent(); this.hydrateImgs(); }\n\n  componentDidUpdate() {\n    this.applyAccent();\n    this.hydrateImgs();\n    const el = this.chatRef.current;\n    if (el) el.scrollTop = el.scrollHeight;\n  }\n\n  send() {\n    const t = this.state.input.trim();\n    if (!t) return;\n    this.setState((s) => ({\n      messages: [...s.messages, { id: s.messages.length, isAgent: false, isUser: true, text: t }],\n      input: \"\",\n    }));\n    const delay = this.props.replyDelay || 4000;\n    setTimeout(() => {\n      this.setState((s) => ({\n        messages: [...s.messages, {\n          id: s.messages.length,\n          isAgent: true,\n          isUser: false,\n          avatar: \"assets/dj-crystal-reply.png\",\n          text: \"Thanks so much for reaching out! We got your message and really appreciate you connecting with us. Stay tuned to Z100!\",\n        }],\n      }));\n    }, delay);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const PHT = \"Title Copy That Keeps Going Very Very Long Title\";\n    const ph = () => ({ img: \"\", ph: true, title: PHT, label: \"Title Copy\" });\n\n    const trending = [\n      { img: \"assets/trending-festival.png\", ph: false, title: \"The iHeartRadio Music Festival Lineup Is Coming! — Hear It First June 2nd At 8AM ET!\" },\n      { img: \"assets/trending-jingle.png\", ph: false, title: \"Listen As Our iHeartRadio Jingle Ball Lineup Is Revealed Tonight At 8pm ET / 5pm PT!\" },\n      ph(), ph(),\n    ];\n    const latest = [\n      { img: \"assets/news-mgk.png\", ph: false, title: \"WATCH: MGK Brings Out Surprise Guest For Unexpected Acoustic Cover\" },\n      { img: \"assets/news-weeknd.png\", ph: false, title: \"The Weeknd Releases His New 'Timeless' Collaboration With Playboi Carti\" },\n      ph(), ph(),\n    ];\n    const recentlyPlayed = [\n      { img: \"assets/album-watermelon.png\", title: \"Watermelon Sugar\", desc: \"1 Line Card Desc - XS\", live: true },\n      { img: \"assets/album-circles.png\", title: \"Circles\", desc: \"1 Line Card Desc - XS\", live: false },\n      { img: \"assets/album-breakmyheart.png\", title: \"Break My Heart\", desc: \"1 Line Card Desc - XS\", live: false },\n    ];\n    const podcasts = [\n      { img: \"assets/elvis-duran.png\", ph: false, label: \"Elvis and Duran\" },\n      { img: \"assets/podcast-2.png\", ph: false, label: \"Elvis and Duran\" },\n      { img: \"assets/podcast-3.png\", ph: false, label: \"Elvis and Duran\" },\n      { img: \"assets/podcast-4.png\", ph: false, label: \"Elvis and Duran\" },\n      ph(), ph(),\n    ];\n    const playlists = [\n      { img: \"assets/elvis-duran.png\", ph: false, label: \"Hits Now\" },\n      { img: \"assets/playlist-roadtrip.png\", ph: false, label: \"Road Trip\" },\n      { img: \"assets/playlist-noboundaries.png\", ph: false, label: \"No Boundaries\" },\n      { img: \"assets/playlist-morning.png\", ph: false, label: \"Morning Wake up\" },\n      ph(), ph(),\n    ];\n    const mostPlayed = [\n      { img: \"assets/album-watermelon.png\", ph: false, label: \"Watermelon Sugar\" },\n      { img: \"assets/album-circles.png\", ph: false, label: \"Circles\" },\n      { img: \"assets/album-breakmyheart.png\", ph: false, label: \"Break My Heart\" },\n      { img: \"assets/playlist-roadtrip.png\", ph: false, label: \"Road Trip\" },\n      ph(), ph(),\n    ];\n\n    const segBase = { flex: 1, display: \"flex\", alignItems: \"center\", justifyContent: \"center\", padding: \"8px 16px\", borderRadius: \"999px\", cursor: \"pointer\", transition: \"all .2s\" };\n    const txtBase = { fontWeight: 600, fontSize: \"15px\", lineHeight: \"20px\", textAlign: \"center\", whiteSpace: \"nowrap\" };\n    const onVoice = s.tab === \"voice\";\n\n    return {\n      isStation: s.screen === \"station\",\n      isTalkback: s.screen === \"talkback\",\n      goTalkback: () => this.setState({ screen: \"talkback\" }),\n      goStation: () => this.setState({ screen: \"station\" }),\n      isVoice: onVoice,\n      isText: !onVoice,\n      setVoice: () => this.setState({ tab: \"voice\" }),\n      setText: () => this.setState({ tab: \"text\" }),\n      voiceSeg: { ...segBase, background: onVoice ? \"#27292d\" : \"transparent\", boxShadow: onVoice ? \"0 1px 1.5px rgba(0,0,0,0.12)\" : \"none\" },\n      textSeg: { ...segBase, background: !onVoice ? \"#27292d\" : \"transparent\", boxShadow: !onVoice ? \"0 1px 1.5px rgba(0,0,0,0.12)\" : \"none\" },\n      voiceTxt: { ...txtBase, color: onVoice ? \"#fff\" : \"#27292d\" },\n      textTxt: { ...txtBase, color: !onVoice ? \"#fff\" : \"#27292d\" },\n      input: s.input,\n      onInput: (e) => this.setState({ input: e.target.value }),\n      onKey: (e) => { if (e.key === \"Enter\") this.send(); },\n      send: () => this.send(),\n      hasInput: s.input.trim().length > 0,\n      messages: s.messages,\n      hasUser: s.messages.some((m) => m.isUser),\n      chatRef: this.chatRef,\n      rootRef: this.rootRef,\n      trending, latest, recentlyPlayed, podcasts, playlists, mostPlayed,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
